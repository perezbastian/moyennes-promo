<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Moyennes I2</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
margin:0;
}

header{
background:#1e2a38;
color:white;
padding:20px;
text-align:center;
font-size:24px;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
cursor:pointer;
}

.card:hover{
background:#f7f9ff;
}

.hidden{
display:none;
}

input{
width:70px;
padding:6px;
margin:4px;
}

button{
padding:8px 15px;
background:#2e6df6;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
Calculateur de Moyennes I2
</header>

<div class="container">

<!-- PAGE ACCUEIL -->

<div id="home">

<div class="card" onclick="openPage('s3')">
Semestre 3
</div>

<div class="card" onclick="openPage('s4')">
Semestre 4
</div>

</div>

<!-- SEMESTRE 3 -->

<div id="s3" class="hidden">

<button onclick="openPage('home')">⬅ Retour</button>

<div class="card" onclick="openPage('ue2')">
UE2 – Electronique
</div>

</div>

<!-- UE2 -->

<div id="ue2" class="hidden">

<button onclick="openPage('s3')">⬅ Retour</button>

<h2>Electronique I2</h2>

CC
<input id="elec_cc">

TP
<input id="elec_tp">

<hr>

<h2>Projet Makerspace</h2>

Projet
<input id="maker">

<hr>

<h2>Outils Mathématiques</h2>

CC1
<input id="math1">

CC2
<input id="math2">

<br><br>

<button onclick="calcul()">Calculer</button>

<h3 id="result"></h3>

</div>

</div>

<script>

function openPage(page){

let pages = ["home","s3","s4","ue2"]

pages.forEach(p=>{
document.getElementById(p).classList.add("hidden")
})

document.getElementById(page).classList.remove("hidden")

}

function calcul(){

let elec =
Number(elec_cc.value)*0.5 +
Number(elec_tp.value)*0.5

let maker =
Number(maker.value)

let math =
(Number(math1.value)+Number(math2.value))/2

let ue =
elec*0.28 +
maker*0.27 +
math*0.45

result.innerHTML =
"Moyenne UE : "+ue.toFixed(2)

}

</script>

</body>
</html>
